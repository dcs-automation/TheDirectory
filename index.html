<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheDirectory</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-hover: #242424;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text-muted: #888;
      --accent: #5b9bd5;
      --accent-hover: #7ab3e8;
      --danger: #d55b5b;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 900px;
      padding: 48px 24px 0;
      text-align: center;
    }

    .clock {
      font-size: 4rem;
      font-weight: 200;
      letter-spacing: 4px;
      color: var(--text);
    }

    .date {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* ── Search ── */
    .search-wrap {
      width: 100%;
      max-width: 560px;
      margin: 32px auto 0;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .search-input::placeholder { color: var(--text-muted); }

    /* ── Main grid ── */
    .main {
      width: 100%;
      max-width: 900px;
      padding: 40px 24px 80px;
    }

    .category {
      margin-bottom: 32px;
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .category-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .category-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity .2s;
    }

    .category:hover .category-actions,
    .category-actions:focus-within {
      opacity: 1;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s;
    }

    .icon-btn:hover { background: var(--surface-hover); color: var(--text); }
    .icon-btn.danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    .icon-btn svg { width: 14px; height: 14px; }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    /* ── Link tile ── */
    .link-tile {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      transition: background .15s, border-color .15s;
      cursor: pointer;
      overflow: hidden;
    }

    .link-tile:hover { background: var(--surface-hover); border-color: #333; }

    .link-tile .favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .link-tile .link-label {
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-tile .tile-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .link-tile:hover .tile-delete { display: flex; }

    /* ── Add-category button ── */
    .add-category-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: none;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .add-category-btn:hover { color: var(--text); border-color: #555; }

    /* ── Notepad sidebar ── */
    .notepad-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 50;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s;
    }

    .notepad-toggle:hover { background: var(--surface-hover); color: var(--text); }
    .notepad-toggle svg { width: 18px; height: 18px; }

    .notepad-panel {
      position: fixed;
      top: 0;
      right: -320px;
      width: 320px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 40;
      display: flex;
      flex-direction: column;
      transition: right .25s ease;
    }

    .notepad-panel.open { right: 0; }

    .notepad-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .notepad-header span {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .notepad-status {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0;
      text-transform: none;
      font-weight: 400;
      transition: opacity .3s;
    }

    .notepad-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color .15s;
    }

    .notepad-close:hover { color: var(--text); }
    .notepad-close svg { width: 16px; height: 16px; }

    .notepad-textarea {
      flex: 1;
      width: 100%;
      padding: 16px;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.6;
      resize: none;
      outline: none;
    }

    .notepad-textarea::placeholder { color: var(--text-muted); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity .2s, visibility .2s;
    }

    .modal-overlay.open { opacity: 1; visibility: visible; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 90%;
      max-width: 400px;
      transform: translateY(8px);
      transition: transform .2s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h3 {
      font-size: 1rem;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .modal label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal input[type="text"],
    .modal input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .modal input:focus { border-color: var(--accent); }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 6px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface-hover);
      color: var(--text);
      transition: background .15s;
    }

    .btn:hover { background: #333; }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search the web..." autofocus>
    </div>
  </div>

  <!-- Links -->
  <div class="main" id="main"></div>

  <!-- Notepad toggle -->
  <button class="notepad-toggle" id="notepadToggle" title="Notes">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
  </button>

  <!-- Notepad panel -->
  <div class="notepad-panel" id="notepadPanel">
    <div class="notepad-header">
      <span>Notes</span>
      <span class="notepad-status" id="notepadStatus"></span>
      <button class="notepad-close" id="notepadClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <textarea class="notepad-textarea" id="notepadText" placeholder="Write your notes here..."></textarea>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <h3 id="modalTitle">Add Link</h3>
      <div id="modalBody"></div>
      <div class="modal-buttons">
        <button class="btn" id="modalCancel">Cancel</button>
        <button class="btn btn-primary" id="modalConfirm">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ── Data ──
    const DEFAULT_DATA = [
      {
        name: "Frequently Visited",
        links: [
          { label: "Google", url: "https://www.google.com" },
          { label: "YouTube", url: "https://www.youtube.com" },
          { label: "GitHub", url: "https://github.com" },
          { label: "Reddit", url: "https://www.reddit.com" },
          { label: "Wikipedia", url: "https://en.wikipedia.org" },
          { label: "Twitter / X", url: "https://x.com" },
        ]
      },
      {
        name: "Productivity",
        links: [
          { label: "Gmail", url: "https://mail.google.com" },
          { label: "Google Drive", url: "https://drive.google.com" },
          { label: "Calendar", url: "https://calendar.google.com" },
          { label: "Notion", url: "https://www.notion.so" },
        ]
      },
      {
        name: "Entertainment",
        links: [
          { label: "Netflix", url: "https://www.netflix.com" },
          { label: "Spotify", url: "https://open.spotify.com" },
          { label: "Twitch", url: "https://www.twitch.tv" },
        ]
      }
    ];

    const STORAGE_KEY = "theDirectory_data";

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch {}
      return structuredClone(DEFAULT_DATA);
    }

    function save(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    let data = load();

    // ── Clock ──
    function tick() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, "0");
      const m = now.getMinutes().toString().padStart(2, "0");
      document.getElementById("clock").textContent = `${h}:${m}`;
      const opts = { weekday: "long", month: "long", day: "numeric" };
      document.getElementById("date").textContent = now.toLocaleDateString(undefined, opts);
    }
    tick();
    setInterval(tick, 10000);

    // ── Search ──
    document.getElementById("searchInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const q = e.target.value.trim();
        if (!q) return;
        // If it looks like a URL, navigate directly
        if (/^https?:\/\//i.test(q) || (/\.[a-z]{2,}$/i.test(q) && !/\s/.test(q))) {
          const url = /^https?:\/\//i.test(q) ? q : `https://${q}`;
          window.location.href = url;
        } else {
          window.location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
        }
      }
    });

    // ── Favicon helper ──
    function faviconUrl(url) {
      try {
        const host = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?sz=32&domain=${host}`;
      } catch {
        return "";
      }
    }

    // ── Render ──
    function render() {
      const main = document.getElementById("main");
      main.innerHTML = "";

      data.forEach((cat, ci) => {
        const section = document.createElement("div");
        section.className = "category";

        // Header
        const header = document.createElement("div");
        header.className = "category-header";

        const title = document.createElement("span");
        title.className = "category-title";
        title.textContent = cat.name;

        const actions = document.createElement("div");
        actions.className = "category-actions";

        // Add link button
        const addBtn = document.createElement("button");
        addBtn.className = "icon-btn";
        addBtn.title = "Add link";
        addBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
        addBtn.addEventListener("click", () => openAddLinkModal(ci));

        // Rename button
        const renameBtn = document.createElement("button");
        renameBtn.className = "icon-btn";
        renameBtn.title = "Rename category";
        renameBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
        renameBtn.addEventListener("click", () => openRenameCategoryModal(ci));

        // Delete category button
        const delBtn = document.createElement("button");
        delBtn.className = "icon-btn danger";
        delBtn.title = "Delete category";
        delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`;
        delBtn.addEventListener("click", () => {
          if (confirm(`Delete category "${cat.name}" and all its links?`)) {
            data.splice(ci, 1);
            save(data);
            render();
          }
        });

        actions.append(addBtn, renameBtn, delBtn);
        header.append(title, actions);
        section.appendChild(header);

        // Links grid
        const grid = document.createElement("div");
        grid.className = "links-grid";

        cat.links.forEach((link, li) => {
          const tile = document.createElement("a");
          tile.className = "link-tile";
          tile.href = link.url;
          tile.title = link.url;

          const img = document.createElement("img");
          img.className = "favicon";
          img.src = faviconUrl(link.url);
          img.alt = "";
          img.loading = "lazy";
          img.onerror = function() { this.style.display = "none"; };

          const lbl = document.createElement("span");
          lbl.className = "link-label";
          lbl.textContent = link.label;

          const del = document.createElement("button");
          del.className = "tile-delete";
          del.innerHTML = "&times;";
          del.title = "Remove";
          del.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            data[ci].links.splice(li, 1);
            save(data);
            render();
          });

          tile.append(img, lbl, del);
          grid.appendChild(tile);
        });

        section.appendChild(grid);
        main.appendChild(section);
      });

      // Add category button
      const addCat = document.createElement("button");
      addCat.className = "add-category-btn";
      addCat.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Category`;
      addCat.addEventListener("click", openAddCategoryModal);
      main.appendChild(addCat);
    }

    // ── Modal helpers ──
    const overlay = document.getElementById("modalOverlay");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalConfirm = document.getElementById("modalConfirm");
    const modalCancel = document.getElementById("modalCancel");

    let onConfirm = null;

    function openModal(title, bodyHTML, confirmCb) {
      modalTitle.textContent = title;
      modalBody.innerHTML = bodyHTML;
      onConfirm = confirmCb;
      overlay.classList.add("open");
      const first = modalBody.querySelector("input");
      if (first) setTimeout(() => first.focus(), 50);
    }

    function closeModal() {
      overlay.classList.remove("open");
      onConfirm = null;
    }

    modalCancel.addEventListener("click", closeModal);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });
    modalConfirm.addEventListener("click", () => { if (onConfirm) onConfirm(); });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
      if (e.key === "Enter" && overlay.classList.contains("open")) {
        e.preventDefault();
        if (onConfirm) onConfirm();
      }
    });

    // ── Modal openers ──
    function openAddLinkModal(ci) {
      openModal("Add Link", `
        <label for="mLabel">Name</label>
        <input type="text" id="mLabel" placeholder="e.g. My Site">
        <label for="mUrl">URL</label>
        <input type="url" id="mUrl" placeholder="https://example.com">
      `, () => {
        const label = document.getElementById("mLabel").value.trim();
        const url = document.getElementById("mUrl").value.trim();
        if (!label || !url) return;
        const fullUrl = /^https?:\/\//i.test(url) ? url : `https://${url}`;
        data[ci].links.push({ label, url: fullUrl });
        save(data);
        render();
        closeModal();
      });
    }

    function openAddCategoryModal() {
      openModal("Add Category", `
        <label for="mCat">Category Name</label>
        <input type="text" id="mCat" placeholder="e.g. Work">
      `, () => {
        const name = document.getElementById("mCat").value.trim();
        if (!name) return;
        data.push({ name, links: [] });
        save(data);
        render();
        closeModal();
      });
    }

    function openRenameCategoryModal(ci) {
      openModal("Rename Category", `
        <label for="mCat">Category Name</label>
        <input type="text" id="mCat" value="${data[ci].name}">
      `, () => {
        const name = document.getElementById("mCat").value.trim();
        if (!name) return;
        data[ci].name = name;
        save(data);
        render();
        closeModal();
      });
    }

    // ── Notepad ──
    const notepadToggle = document.getElementById("notepadToggle");
    const notepadPanel = document.getElementById("notepadPanel");
    const notepadClose = document.getElementById("notepadClose");
    const notepadText = document.getElementById("notepadText");
    const notepadStatus = document.getElementById("notepadStatus");
    let saveTimer = null;

    notepadToggle.addEventListener("click", () => {
      notepadPanel.classList.toggle("open");
    });
    notepadClose.addEventListener("click", () => {
      notepadPanel.classList.remove("open");
    });

    // Load notes from server
    fetch("/api/notes")
      .then(r => r.json())
      .then(d => { notepadText.value = d.content || ""; })
      .catch(() => {});

    // Auto-save on typing with debounce
    notepadText.addEventListener("input", () => {
      notepadStatus.textContent = "";
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        fetch("/api/notes", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content: notepadText.value })
        })
          .then(() => {
            notepadStatus.textContent = "Saved";
            setTimeout(() => { notepadStatus.textContent = ""; }, 2000);
          })
          .catch(() => { notepadStatus.textContent = "Save failed"; });
      }, 500);
    });

    // ── Init ──
    render();
  </script>
</body>
</html>
