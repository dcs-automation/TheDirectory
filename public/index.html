<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheDirectory</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-hover: #242424;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text-muted: #888;
      --accent: #5b9bd5;
      --accent-hover: #7ab3e8;
      --danger: #d55b5b;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 900px;
      padding: 48px 24px 0;
      text-align: center;
    }

    .clock {
      font-size: 4rem;
      font-weight: 200;
      letter-spacing: 4px;
      color: var(--text);
    }

    .date {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* ── Search ── */
    .search-wrap {
      width: 100%;
      max-width: 560px;
      margin: 32px auto 0;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .search-input::placeholder { color: var(--text-muted); }

    /* ── Main grid ── */
    .main {
      width: 100%;
      max-width: 900px;
      padding: 40px 24px 80px;
    }

    .category {
      margin-bottom: 32px;
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .category-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .category-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity .2s;
    }

    .category:hover .category-actions,
    .category-actions:focus-within {
      opacity: 1;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s;
    }

    .icon-btn:hover { background: var(--surface-hover); color: var(--text); }
    .icon-btn.danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    .icon-btn svg { width: 14px; height: 14px; }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    /* ── Link tile ── */
    .link-tile {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      transition: background .15s, border-color .15s;
      cursor: pointer;
      overflow: hidden;
    }

    .link-tile:hover { background: var(--surface-hover); border-color: #333; }

    .link-tile .favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .link-tile .link-label {
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-tile .tile-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .link-tile .tile-edit {
      position: absolute;
      top: 4px;
      right: 24px;
      background: var(--surface-hover);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .link-tile .tile-edit:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .link-tile:hover .tile-edit { display: flex; }
    .link-tile:hover .tile-delete { display: flex; }

    .link-tile.dragging { opacity: 0.3; }

    .links-grid.drag-over {
      outline: 2px dashed var(--accent);
      outline-offset: 4px;
      border-radius: var(--radius);
    }

    .link-tile.drop-before { box-shadow: -3px 0 0 0 var(--accent); }
    .link-tile.drop-after { box-shadow: 3px 0 0 0 var(--accent); }

    /* ── Add-category button ── */
    .add-category-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: none;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .add-category-btn:hover { color: var(--text); border-color: #555; }

    /* ── Side boxes (notepad + calendar) ── */
    .side-box {
      position: fixed;
      top: 48px;
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      z-index: 40;
    }

    .side-box--left {
      left: 24px;
      top: 48px;
      bottom: 48px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: none;
      border: none;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .side-box--left::-webkit-scrollbar { width: 4px; }
    .side-box--left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .side-panel {
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .side-panel--notes { height: 200px; }
    .side-panel--lists { min-height: 280px; flex: 1; }
    .side-box--right { right: 24px; background: var(--bg); border: none; }
    .side-box--right .side-box-header { justify-content: center; border-bottom: none; }

    .side-box-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
    }

    .side-panel .side-box-header { border-bottom: 1px solid var(--border); }

    .side-box-header span {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .notepad-status {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0;
      text-transform: none;
      font-weight: 400;
    }

    .notepad-textarea {
      flex: 1;
      width: 100%;
      padding: 12px 14px;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      line-height: 1.6;
      resize: none;
      outline: none;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .notepad-textarea::placeholder { color: var(--text-muted); }

    /* ── Lists widget ── */
    .lists-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .lists-header-left {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      min-width: 0;
    }

    .lists-header-left:hover { color: var(--accent); }

    .lists-name {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lists-header-left:hover .lists-name { color: var(--accent); }

    .lists-arrow {
      font-size: 0.6rem;
      color: var(--text-muted);
      transition: transform .2s;
    }

    .lists-menu-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }

    .lists-menu-btn:hover { background: var(--surface-hover); color: var(--text); }

    .lists-dropdown,
    .lists-context-menu {
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 60;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }

    .lists-context-menu { left: auto; right: 0; }

    .lists-dropdown button,
    .lists-context-menu button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 14px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
      text-align: left;
    }

    .lists-dropdown button:hover,
    .lists-context-menu button:hover { background: var(--surface-hover); }
    .lists-context-menu button.danger { color: var(--danger); }
    .lists-context-menu button.danger:hover { background: rgba(213,91,91,.15); }

    .lists-dropdown button.active {
      color: var(--accent);
      font-weight: 600;
    }

    .lists-items {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .lists-items::-webkit-scrollbar { width: 4px; }
    .lists-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      cursor: default;
      position: relative;
    }

    .list-item:hover { background: var(--surface-hover); }

    .list-item input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
    }

    .list-item input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .list-item input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .list-item-text {
      flex: 1;
      font-size: 0.83rem;
      color: var(--text);
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: text;
      padding: 2px 0;
    }

    .list-item-text.done {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .list-item-text:focus {
      outline: none;
      white-space: normal;
      overflow: visible;
    }

    .list-item .item-delete {
      display: none;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 2px;
      flex-shrink: 0;
      line-height: 1;
    }

    .list-item:hover .item-delete { display: block; }
    .list-item .item-delete:hover { color: var(--danger); }

    .list-item.drag-over-above { box-shadow: 0 -2px 0 0 var(--accent) inset; }
    .list-item.drag-over-below { box-shadow: 0 2px 0 0 var(--accent) inset; }

    .lists-add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 8px 14px;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.82rem;
      cursor: pointer;
    }

    .lists-add-btn:hover { color: var(--text); background: var(--surface-hover); }

    /* ── Calendar ── */
    .calendar {
      padding: 14px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      gap: 2px;
    }

    .calendar-dow {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 4px 0 8px;
      font-weight: 600;
    }

    .calendar-day {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 5px 0;
      border-radius: 6px;
    }

    .calendar-day--today {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity .2s, visibility .2s;
    }

    .modal-overlay.open { opacity: 1; visibility: visible; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 90%;
      max-width: 400px;
      transform: translateY(8px);
      transition: transform .2s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h3 {
      font-size: 1rem;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .modal label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal input[type="text"],
    .modal input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .modal input:focus { border-color: var(--accent); }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 6px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface-hover);
      color: var(--text);
      transition: background .15s;
    }

    .btn:hover { background: #333; }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    /* ── Mobile ── */
    @media (max-width: 1200px) {
      .side-box--left, .side-box--right { display: none; }
    }

    @media (max-width: 600px) {
      .header { padding: 28px 16px 0; }
      .clock { font-size: 2.5rem; letter-spacing: 2px; }
      .date { font-size: 0.85rem; }
      .search-wrap { margin-top: 20px; }
      .search-input { padding: 10px 14px 10px 40px; font-size: 0.9rem; }
      .main { padding: 24px 16px 60px; }
      .category { margin-bottom: 24px; }
      .links-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
      .link-tile { padding: 10px 12px; gap: 8px; }
      .link-tile .link-label { font-size: 0.8rem; }
      .category-actions { opacity: 1; }
      .modal { padding: 20px; }
    }

    /* ── Hamburger / mobile panels ── */
    .mobile-toggle {
      display: none;
      position: fixed;
      bottom: 16px;
      z-index: 50;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .mobile-toggle svg { width: 20px; height: 20px; }
    .mobile-toggle:hover { background: var(--surface-hover); color: var(--text); }

    .mobile-toggle--notes { left: 16px; }
    .mobile-toggle--calendar { right: 16px; }

    @media (max-width: 1200px) {
      .mobile-toggle { display: flex; }
      .side-box.mobile-open {
        display: flex;
        position: fixed;
        top: auto;
        bottom: 70px;
        width: calc(100% - 32px);
        max-width: 320px;
        height: auto;
        max-height: 50vh;
        background: var(--surface);
        border: 1px solid var(--border);
      }
      .side-box--left.mobile-open {
        left: 16px;
        right: auto;
        max-height: 70vh;
        background: none;
        border: none;
        overflow-y: auto;
      }
      .side-box--right.mobile-open { right: 16px; left: auto; background: var(--surface); }
    }

    /* ── Tile context menu (long-press on mobile) ── */
    .tile-context-menu {
      position: fixed;
      z-index: 200;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 120px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }

    .tile-context-menu button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 14px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      text-align: left;
    }

    .tile-context-menu button:hover { background: var(--surface-hover); }
    .tile-context-menu button.danger { color: var(--danger); }
    .tile-context-menu button.danger:hover { background: rgba(213,91,91,.15); }
    .tile-context-menu button svg { width: 14px; height: 14px; flex-shrink: 0; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search the web..." autofocus>
    </div>
  </div>

  <!-- Links -->
  <div class="main" id="main"></div>

  <!-- Left sidebar: Notes + Lists -->
  <div class="side-box side-box--left">
    <!-- Notes panel -->
    <div class="side-panel side-panel--notes">
      <div class="side-box-header">
        <span>Notes</span>
        <span class="notepad-status" id="notepadStatus"></span>
      </div>
      <textarea class="notepad-textarea" id="notepadText" placeholder="Write your notes here..."></textarea>
    </div>

    <!-- Lists panel -->
    <div class="side-panel side-panel--lists" id="listsPanel">
      <div class="lists-header">
        <div class="lists-header-left" id="listsHeaderLeft">
          <span class="lists-name" id="listsName">Lists</span>
          <span class="lists-arrow">&#9662;</span>
        </div>
        <button class="lists-menu-btn" id="listsMenuBtn" title="List options">&#8942;</button>
      </div>
      <div class="lists-items" id="listsItems"></div>
      <button class="lists-add-btn" id="listsAddBtn">+ Add an item</button>
    </div>
  </div>

  <!-- Calendar (right) -->
  <div class="side-box side-box--right">
    <div class="side-box-header">
      <span id="calendarMonth"></span>
    </div>
    <div class="calendar" id="calendar"></div>
  </div>

  <!-- Mobile toggles -->
  <button class="mobile-toggle mobile-toggle--notes" id="mobileNotesToggle" title="Notes">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
  </button>
  <button class="mobile-toggle mobile-toggle--calendar" id="mobileCalendarToggle" title="Calendar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  </button>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <h3 id="modalTitle">Add Link</h3>
      <div id="modalBody"></div>
      <div class="modal-buttons">
        <button class="btn" id="modalCancel">Cancel</button>
        <button class="btn btn-primary" id="modalConfirm">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ── Data ──
    let data = [];

    function save(d) {
      fetch("/api/bookmarks", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(d)
      }).catch(() => {});
    }

    // Load bookmarks from server then render
    fetch("/api/bookmarks")
      .then(r => r.json())
      .then(d => { data = d; render(); })
      .catch(() => {});

    // ── Clock ──
    function tick() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, "0");
      const m = now.getMinutes().toString().padStart(2, "0");
      document.getElementById("clock").textContent = `${h}:${m}`;
      const opts = { weekday: "long", month: "long", day: "numeric" };
      document.getElementById("date").textContent = now.toLocaleDateString(undefined, opts);
    }
    tick();
    setInterval(tick, 10000);

    // ── Search ──
    document.getElementById("searchInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const q = e.target.value.trim();
        if (!q) return;
        // If it looks like a URL, navigate directly
        if (/^https?:\/\//i.test(q) || (/\.[a-z]{2,}$/i.test(q) && !/\s/.test(q))) {
          const url = /^https?:\/\//i.test(q) ? q : `https://${q}`;
          window.location.href = url;
        } else {
          window.location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
        }
      }
    });

    // ── Favicon helper ──
    function faviconUrl(url) {
      try {
        const host = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?sz=32&domain=${host}`;
      } catch {
        return "";
      }
    }

    // ── Helpers ──
    function clearDropIndicators(grid) {
      grid.querySelectorAll(".drop-before, .drop-after").forEach(el => {
        el.classList.remove("drop-before", "drop-after");
      });
    }

    // ── Render ──
    function render() {
      const main = document.getElementById("main");
      main.innerHTML = "";

      data.forEach((cat, ci) => {
        const section = document.createElement("div");
        section.className = "category";

        // Header
        const header = document.createElement("div");
        header.className = "category-header";

        const title = document.createElement("span");
        title.className = "category-title";
        title.textContent = cat.name;

        const actions = document.createElement("div");
        actions.className = "category-actions";

        // Add link button
        const addBtn = document.createElement("button");
        addBtn.className = "icon-btn";
        addBtn.title = "Add link";
        addBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
        addBtn.addEventListener("click", () => openAddLinkModal(ci));

        // Rename button
        const renameBtn = document.createElement("button");
        renameBtn.className = "icon-btn";
        renameBtn.title = "Rename category";
        renameBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
        renameBtn.addEventListener("click", () => openRenameCategoryModal(ci));

        // Delete category button
        const delBtn = document.createElement("button");
        delBtn.className = "icon-btn danger";
        delBtn.title = "Delete category";
        delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`;
        delBtn.addEventListener("click", () => {
          if (confirm(`Delete category "${cat.name}" and all its links?`)) {
            data.splice(ci, 1);
            save(data);
            render();
          }
        });

        actions.append(addBtn, renameBtn, delBtn);
        header.append(title, actions);
        section.appendChild(header);

        // Links grid
        const grid = document.createElement("div");
        grid.className = "links-grid";
        grid.addEventListener("dragover", (e) => {
          e.preventDefault();
          // Only show grid-level highlight if dragging over the grid background (not a tile)
          if (e.target === grid) grid.classList.add("drag-over");
        });
        grid.addEventListener("dragleave", (e) => {
          if (e.target === grid) grid.classList.remove("drag-over");
        });
        grid.addEventListener("drop", (e) => {
          e.preventDefault();
          grid.classList.remove("drag-over");
          clearDropIndicators(grid);
          try {
            const src = JSON.parse(e.dataTransfer.getData("text/plain"));
            if (src.ci === ci) return; // dropped on grid bg within same category — no-op
            const [moved] = data[src.ci].links.splice(src.li, 1);
            data[ci].links.push(moved);
            save(data);
            render();
          } catch {}
        });

        cat.links.forEach((link, li) => {
          const tile = document.createElement("a");
          tile.className = "link-tile";
          tile.href = link.url;
          tile.title = link.url;
          tile.draggable = true;
          tile.addEventListener("dragstart", (e) => {
            e.dataTransfer.setData("text/plain", JSON.stringify({ ci, li }));
            tile.classList.add("dragging");
          });
          tile.addEventListener("dragend", () => {
            tile.classList.remove("dragging");
            document.querySelectorAll(".drop-before, .drop-after").forEach(el => {
              el.classList.remove("drop-before", "drop-after");
            });
          });

          // Long-press for mobile context menu
          tile.addEventListener("touchstart", (e) => {
            longPressTriggered = false;
            const touch = e.touches[0];
            longPressTimer = setTimeout(() => {
              longPressTriggered = true;
              showContextMenu(touch.clientX, touch.clientY, ci, li);
            }, 500);
          }, { passive: true });
          tile.addEventListener("touchend", () => clearTimeout(longPressTimer));
          tile.addEventListener("touchmove", () => clearTimeout(longPressTimer));
          tile.addEventListener("click", (e) => {
            if (longPressTriggered) { e.preventDefault(); longPressTriggered = false; }
          });

          // Per-tile drag-over for reorder indicator
          tile.addEventListener("dragover", (e) => {
            e.preventDefault();
            e.stopPropagation();
            grid.classList.remove("drag-over");
            clearDropIndicators(grid);
            const rect = tile.getBoundingClientRect();
            const midX = rect.left + rect.width / 2;
            if (e.clientX < midX) {
              tile.classList.add("drop-before");
              tile.classList.remove("drop-after");
            } else {
              tile.classList.add("drop-after");
              tile.classList.remove("drop-before");
            }
          });
          tile.addEventListener("dragleave", () => {
            tile.classList.remove("drop-before", "drop-after");
          });
          tile.addEventListener("drop", (e) => {
            e.preventDefault();
            e.stopPropagation();
            grid.classList.remove("drag-over");
            clearDropIndicators(grid);
            try {
              const src = JSON.parse(e.dataTransfer.getData("text/plain"));
              const rect = tile.getBoundingClientRect();
              const midX = rect.left + rect.width / 2;
              const insertAfter = e.clientX >= midX;

              // Remove from source
              const [moved] = data[src.ci].links.splice(src.li, 1);

              // Calculate target index (account for removal shifting indices)
              let targetIdx = li;
              if (src.ci === ci && src.li < li) targetIdx--;
              if (insertAfter) targetIdx++;

              data[ci].links.splice(targetIdx, 0, moved);
              save(data);
              render();
            } catch {}
          });

          const img = document.createElement("img");
          img.className = "favicon";
          img.src = faviconUrl(link.url);
          img.alt = "";
          img.loading = "lazy";
          img.onerror = function() { this.style.display = "none"; };

          const lbl = document.createElement("span");
          lbl.className = "link-label";
          lbl.textContent = link.label;

          const editBtn = document.createElement("button");
          editBtn.className = "tile-edit";
          editBtn.innerHTML = `<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
          editBtn.title = "Edit";
          editBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            openEditLinkModal(ci, li);
          });

          const del = document.createElement("button");
          del.className = "tile-delete";
          del.innerHTML = "&times;";
          del.title = "Remove";
          del.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            data[ci].links.splice(li, 1);
            save(data);
            render();
          });

          tile.append(img, lbl, editBtn, del);
          grid.appendChild(tile);
        });

        section.appendChild(grid);
        main.appendChild(section);
      });

      // Add category button
      const addCat = document.createElement("button");
      addCat.className = "add-category-btn";
      addCat.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Category`;
      addCat.addEventListener("click", openAddCategoryModal);
      main.appendChild(addCat);
    }

    // ── Modal helpers ──
    const overlay = document.getElementById("modalOverlay");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalConfirm = document.getElementById("modalConfirm");
    const modalCancel = document.getElementById("modalCancel");

    let onConfirm = null;

    function openModal(title, bodyHTML, confirmCb) {
      modalTitle.textContent = title;
      modalBody.innerHTML = bodyHTML;
      onConfirm = confirmCb;
      overlay.classList.add("open");
      const first = modalBody.querySelector("input");
      if (first) setTimeout(() => first.focus(), 50);
    }

    function closeModal() {
      overlay.classList.remove("open");
      onConfirm = null;
    }

    modalCancel.addEventListener("click", closeModal);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });
    modalConfirm.addEventListener("click", () => { if (onConfirm) onConfirm(); });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
      if (e.key === "Enter" && overlay.classList.contains("open")) {
        e.preventDefault();
        if (onConfirm) onConfirm();
      }
    });

    // ── Modal openers ──
    function openAddLinkModal(ci) {
      openModal("Add Link", `
        <label for="mLabel">Name</label>
        <input type="text" id="mLabel" placeholder="e.g. My Site">
        <label for="mUrl">URL</label>
        <input type="url" id="mUrl" placeholder="https://example.com">
      `, () => {
        const label = document.getElementById("mLabel").value.trim();
        const url = document.getElementById("mUrl").value.trim();
        if (!label || !url) return;
        const fullUrl = /^https?:\/\//i.test(url) ? url : `https://${url}`;
        data[ci].links.push({ label, url: fullUrl });
        save(data);
        render();
        closeModal();
      });
    }

    function openAddCategoryModal() {
      openModal("Add Category", `
        <label for="mCat">Category Name</label>
        <input type="text" id="mCat" placeholder="e.g. Work">
      `, () => {
        const name = document.getElementById("mCat").value.trim();
        if (!name) return;
        data.push({ name, links: [] });
        save(data);
        render();
        closeModal();
      });
    }

    function openEditLinkModal(ci, li) {
      const link = data[ci].links[li];
      openModal("Edit Link", `
        <label for="mLabel">Name</label>
        <input type="text" id="mLabel" value="${link.label.replace(/"/g, '&quot;')}">
        <label for="mUrl">URL</label>
        <input type="url" id="mUrl" value="${link.url.replace(/"/g, '&quot;')}">
      `, () => {
        const label = document.getElementById("mLabel").value.trim();
        const url = document.getElementById("mUrl").value.trim();
        if (!label || !url) return;
        const fullUrl = /^https?:\/\//i.test(url) ? url : `https://${url}`;
        data[ci].links[li] = { label, url: fullUrl };
        save(data);
        render();
        closeModal();
      });
    }

    function openRenameCategoryModal(ci) {
      openModal("Rename Category", `
        <label for="mCat">Category Name</label>
        <input type="text" id="mCat" value="${data[ci].name}">
      `, () => {
        const name = document.getElementById("mCat").value.trim();
        if (!name) return;
        data[ci].name = name;
        save(data);
        render();
        closeModal();
      });
    }

    // ── Notepad ──
    const notepadText = document.getElementById("notepadText");
    const notepadStatus = document.getElementById("notepadStatus");
    let saveTimer = null;

    // Load notes from server
    fetch("/api/notes")
      .then(r => r.json())
      .then(d => { notepadText.value = d.content || ""; })
      .catch(() => {});

    // Auto-save on typing with debounce
    notepadText.addEventListener("input", () => {
      notepadStatus.textContent = "";
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        fetch("/api/notes", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content: notepadText.value })
        })
          .then(() => {
            notepadStatus.textContent = "Saved";
            setTimeout(() => { notepadStatus.textContent = ""; }, 2000);
          })
          .catch(() => { notepadStatus.textContent = "Save failed"; });
      }, 500);
    });

    // ── Calendar ──
    function renderCalendar() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const today = now.getDate();

      document.getElementById("calendarMonth").textContent =
        now.toLocaleDateString(undefined, { month: "long", year: "numeric" });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const days = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];

      let html = '<div class="calendar-grid">';
      days.forEach(d => { html += `<div class="calendar-dow">${d}</div>`; });
      for (let i = 0; i < firstDay; i++) html += '<div class="calendar-day"></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const cls = d === today ? "calendar-day calendar-day--today" : "calendar-day";
        html += `<div class="${cls}">${d}</div>`;
      }
      html += '</div>';
      document.getElementById("calendar").innerHTML = html;
    }
    renderCalendar();

    // ── Mobile panels (reuse actual side-boxes) ──
    const sideBoxLeft = document.querySelector(".side-box--left");
    const sideBoxRight = document.querySelector(".side-box--right");
    const mobileNotesToggle = document.getElementById("mobileNotesToggle");
    const mobileCalendarToggle = document.getElementById("mobileCalendarToggle");

    mobileNotesToggle.addEventListener("click", () => {
      sideBoxRight.classList.remove("mobile-open");
      sideBoxLeft.classList.toggle("mobile-open");
    });

    mobileCalendarToggle.addEventListener("click", () => {
      sideBoxLeft.classList.remove("mobile-open");
      sideBoxRight.classList.toggle("mobile-open");
    });

    document.addEventListener("click", (e) => {
      if (!sideBoxLeft.contains(e.target) && !mobileNotesToggle.contains(e.target)) {
        sideBoxLeft.classList.remove("mobile-open");
      }
      if (!sideBoxRight.contains(e.target) && !mobileCalendarToggle.contains(e.target)) {
        sideBoxRight.classList.remove("mobile-open");
      }
    });

    // ── Long-press context menu for tiles ──
    let longPressTimer = null;
    let longPressTriggered = false;
    let activeContextMenu = null;

    function closeContextMenu() {
      if (activeContextMenu) {
        activeContextMenu.remove();
        activeContextMenu = null;
      }
    }

    function showContextMenu(x, y, ci, li) {
      closeContextMenu();
      const menu = document.createElement("div");
      menu.className = "tile-context-menu";

      const editBtn = document.createElement("button");
      editBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit`;
      editBtn.addEventListener("click", () => { closeContextMenu(); openEditLinkModal(ci, li); });

      const delBtn = document.createElement("button");
      delBtn.className = "danger";
      delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg> Delete`;
      delBtn.addEventListener("click", () => {
        closeContextMenu();
        data[ci].links.splice(li, 1);
        save(data);
        render();
      });

      menu.append(editBtn, delBtn);
      document.body.appendChild(menu);

      // Position within viewport
      const menuRect = menu.getBoundingClientRect();
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      menu.style.left = Math.min(x, vw - menuRect.width - 8) + "px";
      menu.style.top = Math.min(y, vh - menuRect.height - 8) + "px";

      activeContextMenu = menu;
    }

    document.addEventListener("click", (e) => {
      if (activeContextMenu && !activeContextMenu.contains(e.target)) closeContextMenu();
    });
    document.addEventListener("scroll", closeContextMenu, true);

    // ── Lists Widget ──
    let listsData = [];
    let currentListIdx = 0;
    let listsSaveTimer = null;

    const listsName = document.getElementById("listsName");
    const listsItems = document.getElementById("listsItems");
    const listsAddBtn = document.getElementById("listsAddBtn");
    const listsHeaderLeft = document.getElementById("listsHeaderLeft");
    const listsMenuBtn = document.getElementById("listsMenuBtn");
    const listsPanel = document.getElementById("listsPanel");

    function genId() {
      return Math.random().toString(36).slice(2, 10);
    }

    function saveLists() {
      clearTimeout(listsSaveTimer);
      listsSaveTimer = setTimeout(() => {
        fetch("/api/lists", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(listsData)
        }).catch(() => {});
      }, 400);
    }

    function renderLists() {
      // Close any open dropdowns
      closeListsDropdowns();

      if (listsData.length === 0) {
        listsName.textContent = "Lists";
        listsItems.innerHTML = '<div style="padding: 14px; color: var(--text-muted); font-size: 0.82rem;">No lists yet. Click ⋮ to create one.</div>';
        listsAddBtn.style.display = "none";
        return;
      }

      if (currentListIdx >= listsData.length) currentListIdx = listsData.length - 1;
      const list = listsData[currentListIdx];
      listsName.textContent = list.name;
      listsAddBtn.style.display = "";

      listsItems.innerHTML = "";
      list.items.forEach((item, idx) => {
        const row = document.createElement("div");
        row.className = "list-item";
        row.draggable = true;

        row.addEventListener("dragstart", (e) => {
          e.dataTransfer.setData("text/plain", JSON.stringify({ type: "list-item", idx }));
          row.style.opacity = "0.3";
        });
        row.addEventListener("dragend", () => {
          row.style.opacity = "";
          listsItems.querySelectorAll(".drag-over-above, .drag-over-below").forEach(el => {
            el.classList.remove("drag-over-above", "drag-over-below");
          });
        });
        row.addEventListener("dragover", (e) => {
          e.preventDefault();
          e.stopPropagation();
          listsItems.querySelectorAll(".drag-over-above, .drag-over-below").forEach(el => {
            el.classList.remove("drag-over-above", "drag-over-below");
          });
          const rect = row.getBoundingClientRect();
          const midY = rect.top + rect.height / 2;
          if (e.clientY < midY) {
            row.classList.add("drag-over-above");
          } else {
            row.classList.add("drag-over-below");
          }
        });
        row.addEventListener("dragleave", () => {
          row.classList.remove("drag-over-above", "drag-over-below");
        });
        row.addEventListener("drop", (e) => {
          e.preventDefault();
          e.stopPropagation();
          row.classList.remove("drag-over-above", "drag-over-below");
          try {
            const src = JSON.parse(e.dataTransfer.getData("text/plain"));
            if (src.type !== "list-item") return;
            const rect = row.getBoundingClientRect();
            const midY = rect.top + rect.height / 2;
            const insertAfter = e.clientY >= midY;
            const [moved] = list.items.splice(src.idx, 1);
            let targetIdx = idx;
            if (src.idx < idx) targetIdx--;
            if (insertAfter) targetIdx++;
            list.items.splice(targetIdx, 0, moved);
            saveLists();
            renderLists();
          } catch {}
        });

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = item.done;
        cb.addEventListener("change", () => {
          item.done = cb.checked;
          saveLists();
          renderLists();
        });

        const text = document.createElement("span");
        text.className = "list-item-text" + (item.done ? " done" : "");
        text.textContent = item.text;
        text.contentEditable = "true";
        text.spellcheck = false;
        text.addEventListener("focus", () => {
          // Select all on focus for easier editing
          const range = document.createRange();
          range.selectNodeContents(text);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        });
        text.addEventListener("blur", () => {
          const newText = text.textContent.trim();
          if (newText && newText !== item.text) {
            item.text = newText;
            saveLists();
          } else if (!newText) {
            // Empty text = delete
            list.items.splice(idx, 1);
            saveLists();
            renderLists();
            return;
          }
          // Re-render to reset any whitespace
          text.textContent = item.text;
        });
        text.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); text.blur(); }
          if (e.key === "Escape") { text.textContent = item.text; text.blur(); }
        });

        const del = document.createElement("button");
        del.className = "item-delete";
        del.innerHTML = "&times;";
        del.title = "Remove";
        del.addEventListener("click", () => {
          list.items.splice(idx, 1);
          saveLists();
          renderLists();
        });

        row.append(cb, text, del);
        listsItems.appendChild(row);
      });
    }

    // Add item
    listsAddBtn.addEventListener("click", () => {
      if (listsData.length === 0) return;
      const list = listsData[currentListIdx];
      if (list.items.length >= 100) return;
      const newItem = { id: genId(), text: "New item", done: false };
      list.items.push(newItem);
      saveLists();
      renderLists();
      // Focus the new item for editing
      const lastText = listsItems.querySelector(".list-item:last-child .list-item-text");
      if (lastText) {
        lastText.focus();
      }
    });

    // List switcher dropdown
    let activeListsDropdown = null;

    function closeListsDropdowns() {
      if (activeListsDropdown) {
        activeListsDropdown.remove();
        activeListsDropdown = null;
      }
    }

    listsHeaderLeft.addEventListener("click", (e) => {
      e.stopPropagation();
      if (activeListsDropdown) { closeListsDropdowns(); return; }
      if (listsData.length <= 1) return;
      const dd = document.createElement("div");
      dd.className = "lists-dropdown";
      listsData.forEach((list, i) => {
        const btn = document.createElement("button");
        btn.textContent = list.name;
        if (i === currentListIdx) btn.className = "active";
        btn.addEventListener("click", () => {
          currentListIdx = i;
          closeListsDropdowns();
          renderLists();
        });
        dd.appendChild(btn);
      });
      const header = listsPanel.querySelector(".lists-header");
      header.appendChild(dd);
      activeListsDropdown = dd;
    });

    // Three-dot menu
    listsMenuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (activeListsDropdown) { closeListsDropdowns(); return; }
      const menu = document.createElement("div");
      menu.className = "lists-context-menu";

      // New list
      if (listsData.length < 10) {
        const newBtn = document.createElement("button");
        newBtn.textContent = "New list";
        newBtn.addEventListener("click", () => {
          closeListsDropdowns();
          const name = prompt("List name:");
          if (!name || !name.trim()) return;
          listsData.push({ name: name.trim(), items: [] });
          currentListIdx = listsData.length - 1;
          saveLists();
          renderLists();
        });
        menu.appendChild(newBtn);
      }

      if (listsData.length > 0) {
        // Rename
        const renameBtn = document.createElement("button");
        renameBtn.textContent = "Rename list";
        renameBtn.addEventListener("click", () => {
          closeListsDropdowns();
          const name = prompt("Rename list:", listsData[currentListIdx].name);
          if (!name || !name.trim()) return;
          listsData[currentListIdx].name = name.trim();
          saveLists();
          renderLists();
        });
        menu.appendChild(renameBtn);

        // Copy to clipboard
        const copyBtn = document.createElement("button");
        copyBtn.textContent = "Copy to clipboard";
        copyBtn.addEventListener("click", () => {
          closeListsDropdowns();
          const list = listsData[currentListIdx];
          const text = list.items.map(i => `${i.done ? "[x]" : "[ ]"} ${i.text}`).join("\n");
          navigator.clipboard.writeText(list.name + "\n" + text).catch(() => {});
        });
        menu.appendChild(copyBtn);

        // Delete
        const delBtn = document.createElement("button");
        delBtn.className = "danger";
        delBtn.textContent = "Delete list";
        delBtn.addEventListener("click", () => {
          closeListsDropdowns();
          if (!confirm(`Delete list "${listsData[currentListIdx].name}"?`)) return;
          listsData.splice(currentListIdx, 1);
          if (currentListIdx >= listsData.length) currentListIdx = Math.max(0, listsData.length - 1);
          saveLists();
          renderLists();
        });
        menu.appendChild(delBtn);
      }

      const header = listsPanel.querySelector(".lists-header");
      header.appendChild(menu);
      activeListsDropdown = menu;
    });

    // Close dropdowns on outside click
    document.addEventListener("click", (e) => {
      if (activeListsDropdown && !activeListsDropdown.contains(e.target) &&
          !listsHeaderLeft.contains(e.target) && !listsMenuBtn.contains(e.target)) {
        closeListsDropdowns();
      }
    });

    // Load lists from server
    fetch("/api/lists")
      .then(r => r.json())
      .then(d => { listsData = Array.isArray(d) ? d : []; renderLists(); })
      .catch(() => { renderLists(); });

  </script>
</body>
</html>
